<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>NEON BREAKER</title>

<!-- Telegram Web App SDK -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

<style>
  :root{
    --bg-0:#05060f;
    --bg-1:#0a0d1f;
    --grid:rgba(80,120,255,0.05);
    --neon-cyan:#19f6ff;
    --neon-pink:#ff2d95;
    --text:#eaf6ff;
    --display:'Orbitron','Rajdhani',monospace;
    --body:'Rajdhani',system-ui,monospace;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html,body{
    margin:0; padding:0; width:100%; height:100%;
    overflow:hidden;
    background:var(--bg-0);
    color:var(--text);
    font-family:var(--body);
    user-select:none; -webkit-user-select:none;
    touch-action:none; overscroll-behavior:none;
  }

  #game{
    display:block;
    position:fixed; inset:0;
    width:100%; height:100%;
    background:
      radial-gradient(120% 120% at 50% -10%, var(--bg-1) 0%, var(--bg-0) 60%, #02030a 100%);
  }

  /* ---------- Game Over modal ---------- */
  #overlay{
    position:fixed; inset:0;
    display:none;
    align-items:center; justify-content:center;
    padding:24px;
    background:rgba(3,4,12,0.82);
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
    z-index:10;
    animation:fade .35s ease both;
  }
  #overlay.show{ display:flex; }

  @keyframes fade{ from{opacity:0} to{opacity:1} }
  @keyframes pop{ from{opacity:0; transform:translateY(18px) scale(.94)} to{opacity:1; transform:none} }

  .card{
    width:100%; max-width:340px;
    text-align:center;
    padding:30px 26px 26px;
    border-radius:22px;
    background:linear-gradient(160deg, rgba(25,30,60,.9), rgba(8,10,24,.95));
    border:1px solid rgba(25,246,255,.35);
    box-shadow:
      0 0 0 1px rgba(255,45,149,.10) inset,
      0 18px 60px rgba(0,0,0,.6),
      0 0 50px rgba(25,246,255,.18);
    animation:pop .45s cubic-bezier(.2,.9,.25,1) both;
  }

  .card .tag{
    font-family:var(--body);
    letter-spacing:.32em;
    font-size:12px; font-weight:700;
    color:var(--neon-pink);
    text-transform:uppercase;
    margin:0 0 6px;
    text-shadow:0 0 12px rgba(255,45,149,.7);
  }
  .card h1{
    font-family:var(--display);
    font-size:26px; font-weight:800;
    margin:0 0 18px; letter-spacing:.06em;
    color:#fff;
    text-shadow:0 0 18px rgba(25,246,255,.55);
  }
  .scorebox{
    margin:6px auto 22px;
    padding:14px 10px;
    border-radius:16px;
    background:rgba(0,0,0,.35);
    border:1px solid rgba(25,246,255,.18);
  }
  .scorebox .label{
    font-size:12px; letter-spacing:.28em; text-transform:uppercase;
    color:rgba(234,246,255,.6); margin-bottom:2px;
  }
  .scorebox .value{
    font-family:var(--display);
    font-size:46px; font-weight:800; line-height:1;
    color:var(--neon-cyan);
    text-shadow:0 0 22px rgba(25,246,255,.6);
  }

  .btn{
    display:block; width:100%;
    border:none; cursor:pointer;
    font-family:var(--display);
    font-weight:800; letter-spacing:.05em;
    font-size:16px; text-transform:uppercase;
    padding:15px 16px; border-radius:14px;
    margin-top:12px;
    color:#03121a;
    background:linear-gradient(100deg, var(--neon-cyan), #6df);
    box-shadow:0 8px 26px rgba(25,246,255,.4), 0 0 0 1px rgba(255,255,255,.25) inset;
    transition:transform .12s ease, box-shadow .12s ease, opacity .12s;
  }
  .btn:active{ transform:translateY(2px) scale(.99); box-shadow:0 4px 14px rgba(25,246,255,.35); }

  .btn.ghost{
    color:var(--text);
    background:transparent;
    border:1px solid rgba(234,246,255,.25);
    box-shadow:none;
  }
  .btn.ghost:active{ background:rgba(255,255,255,.06); }

  #hint{
    position:fixed; left:0; right:0; bottom:max(18px, env(safe-area-inset-bottom));
    text-align:center; z-index:5; pointer-events:none;
    font-size:13px; letter-spacing:.22em; text-transform:uppercase;
    color:rgba(234,246,255,.45);
    transition:opacity .4s;
  }
</style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="hint">Swipe to aim &nbsp;&middot;&nbsp; Release to fire</div>

  <div id="overlay">
    <div class="card">
      <p class="tag">Game Over</p>
      <h1>NEON BREAKER</h1>
      <div class="scorebox">
        <div class="label">Blocks Destroyed</div>
        <div class="value" id="finalScore">0</div>
      </div>
      <button class="btn" id="returnBtn">Return to Bot</button>
      <button class="btn ghost" id="againBtn">Play Again</button>
    </div>
  </div>

<script>
"use strict";

/* =========================================================================
   NEON BREAKER  -  Swipe Brick Breaker clone
   Single-file HTML5 Canvas + vanilla JS, mobile-first, Telegram Web App ready
   ========================================================================= */

/* ---------- Telegram init ---------- */
const TG = (window.Telegram && window.Telegram.WebApp) ? window.Telegram.WebApp : null;
if (TG) {
  try { TG.ready(); TG.expand(); } catch (e) {}
}

/* ---------- Canvas / DOM ---------- */
const cvs = document.getElementById('game');
const ctx = cvs.getContext('2d');
const overlay   = document.getElementById('overlay');
const finalEl   = document.getElementById('finalScore');
const returnBtn = document.getElementById('returnBtn');
const againBtn  = document.getElementById('againBtn');
const hintEl    = document.getElementById('hint');

/* ---------- Layout constants ---------- */
const COLS = 7;                 // grid columns
let DPR, W, H;                  // CSS-pixel viewport size
let cell, gap, originX;         // block grid metrics
let topMargin, bottomY, dangerY;
let ballR;

/* ---------- Tunables ---------- */
const BALL_SPEED   = 9.2;       // px per ~16.7ms frame
const FIRE_GAP     = 70;        // ms between consecutive ball launches
const SUBSTEPS     = 6;         // collision sub-steps per frame (anti-tunneling)
const START_BALLS  = 10;
const MAX_BALL_LIFE = 13000;    // ms before a stray ball is force-returned

/* ---------- Game state ---------- */
let phase = 'idle';             // 'idle' | 'shooting' | 'over'
let round = 1;
let score = 0;                  // blocks destroyed
let ballCount = START_BALLS;
let launcherX;                  // x of the launcher (carries over each round)

let blocks  = [];               // {col,row,hp,x,y,size}
let pickups = [];               // {col,row,x,y,r,collected}
let balls   = [];               // active balls in flight

let toFire = 0;                 // balls still queued to launch this volley
let fireDir = {x:0, y:-1};
let fireTimer = 0;
let firstReturnX = null;        // x of the first ball to come back -> next launcher

/* ---------- Aiming ---------- */
let aiming = false;
let aimValid = false;
let aimDir = {x:0, y:-1};

/* =========================================================================
   Resize / layout
   ========================================================================= */
function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 3);
  W = window.innerWidth;
  H = window.innerHeight;

  cvs.width  = Math.round(W * DPR);
  cvs.height = Math.round(H * DPR);
  cvs.style.width  = W + 'px';
  cvs.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

  cell    = Math.floor(W / COLS);
  gap     = Math.max(3, Math.floor(cell * 0.07));
  originX = Math.floor((W - cell * COLS) / 2);
  ballR   = Math.max(5, Math.floor(cell * 0.12));

  topMargin = Math.round(H * 0.11);                 // leave room for HUD
  bottomY   = H - Math.round(H * 0.07) - ballR;     // launch line
  dangerY   = bottomY;                              // block touching this = game over

  if (launcherX == null) launcherX = W / 2;
  launcherX = clamp(launcherX, ballR, W - ballR);

  layout();
}

/* recompute pixel coords from grid coords */
function layout() {
  const size = cell - gap;
  for (const b of blocks) {
    b.size = size;
    b.x = originX + b.col * cell + gap / 2;
    b.y = topMargin + b.row * cell + gap / 2;
  }
  for (const p of pickups) {
    p.r = Math.max(6, Math.floor(cell * 0.16));
    p.x = originX + p.col * cell + cell / 2;
    p.y = topMargin + p.row * cell + cell / 2;
  }
}

/* =========================================================================
   Utility
   ========================================================================= */
function clamp(v, lo, hi){ return v < lo ? lo : (v > hi ? hi : v); }
function randInt(a, b){ return a + Math.floor(Math.random() * (b - a + 1)); }

function roundRect(x, y, w, h, r){
  r = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y,   x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x,   y+h, r);
  ctx.arcTo(x,   y+h, x,   y,   r);
  ctx.arcTo(x,   y,   x+w, y,   r);
  ctx.closePath();
}

/* HP -> neon colour ramp (cyan -> green -> yellow -> orange -> red -> magenta) */
function hpColor(hp){
  const t = clamp(hp / (8 + round * 2), 0, 1.25);
  let hue;
  if (t <= 1) hue = 175 - t * 175;        // 175(cyan) -> 0(red)
  else        hue = 360 - (t - 1) * 160;  // beyond -> magenta/purple
  return {
    fill:   'hsla(' + hue + ', 90%, 55%, 0.30)',
    border: 'hsla(' + hue + ', 95%, 62%, 1)',
    glow:   'hsla(' + hue + ', 100%, 60%, 0.85)'
  };
}

/* =========================================================================
   Block / row generation
   ========================================================================= */
function newHp(){
  const base = round;
  const r = Math.random();
  if (r < 0.14) return base * 2;                 // tough block
  if (r < 0.32) return base + randInt(0, 2);
  return Math.max(1, base);
}

function spawnRow(){
  // choose how many cells are filled (leave at least one gap so balls can pass)
  const filled = randInt(2, COLS - 1);
  const cols = [];
  for (let i = 0; i < COLS; i++) cols.push(i);
  for (let i = cols.length - 1; i > 0; i--){
    const j = randInt(0, i);
    const tmp = cols[i]; cols[i] = cols[j]; cols[j] = tmp;
  }
  const used = cols.slice(0, filled);
  const free = cols.slice(filled);

  for (const c of used){
    blocks.push({ col:c, row:0, hp:newHp(), x:0, y:0, size:0 });
  }
  // occasionally drop a +1-ball pickup in a free cell
  if (free.length && Math.random() < 0.85){
    pickups.push({ col:free[0], row:0, x:0, y:0, r:0, collected:false });
  }
  layout();
}

/* =========================================================================
   Input - touch + mouse (mouse for desktop testing)
   ========================================================================= */
function pointFrom(e){
  const r = cvs.getBoundingClientRect();
  const t = (e.touches && e.touches[0]) ? e.touches[0]
          : (e.changedTouches && e.changedTouches[0]) ? e.changedTouches[0]
          : e;
  return { x: t.clientX - r.left, y: t.clientY - r.top };
}

function updateAim(p){
  let dx = p.x - launcherX;
  let dy = p.y - bottomY;
  if (dy > -8) dy = -8;                  // force an upward component
  let ang = Math.atan2(dy, dx);          // in (-PI, 0): upper half
  const minA = 0.16;                     // ~9 deg - avoid near-horizontal shots
  if (ang > -minA) ang = -minA;
  if (ang < -(Math.PI - minA)) ang = -(Math.PI - minA);
  aimDir = { x: Math.cos(ang), y: Math.sin(ang) };
  aimValid = true;
}

function onStart(e){
  if (phase !== 'idle') return;
  e.preventDefault();
  aiming = true; aimValid = false;
  updateAim(pointFrom(e));
}
function onMove(e){
  if (!aiming) return;
  e.preventDefault();
  updateAim(pointFrom(e));
}
function onEnd(e){
  if (!aiming) return;
  e.preventDefault();
  aiming = false;
  if (aimValid) startVolley();
}

cvs.addEventListener('touchstart', onStart, { passive:false });
cvs.addEventListener('touchmove',  onMove,  { passive:false });
cvs.addEventListener('touchend',   onEnd,   { passive:false });
cvs.addEventListener('touchcancel',onEnd,   { passive:false });
cvs.addEventListener('mousedown',  onStart);
window.addEventListener('mousemove', onMove);
window.addEventListener('mouseup',   onEnd);

/* =========================================================================
   Volley control
   ========================================================================= */
function startVolley(){
  phase = 'shooting';
  fireDir = { x:aimDir.x, y:aimDir.y };
  toFire = ballCount;
  fireTimer = 0;
  firstReturnX = null;
  balls = [];
  if (hintEl) hintEl.style.opacity = '0';
}

function spawnBall(){
  balls.push({
    x: launcherX,
    y: bottomY - 1,
    vx: fireDir.x * BALL_SPEED,
    vy: fireDir.y * BALL_SPEED,
    life: 0,
    alive: true
  });
}

function endRound(){
  phase = 'idle';
  round += 1;
  ballCount += 1;                                   // +1 ball per round (spec)
  if (firstReturnX != null) launcherX = clamp(firstReturnX, ballR, W - ballR);

  // push everything down one row
  for (const b of blocks)  b.row += 1;
  for (const p of pickups) p.row += 1;
  layout();

  // game over check - any block reached the danger line?
  for (const b of blocks){
    if (b.y + b.size >= dangerY){ gameOver(); return; }
  }

  spawnRow();
}

/* =========================================================================
   Physics - circle vs axis-aligned block, with sub-stepping
   ========================================================================= */
function collideBall(b){
  // one block collision per sub-step (break after the first resolved hit)
  for (let i = 0; i < blocks.length; i++){
    const k = blocks[i];
    const cx = clamp(b.x, k.x, k.x + k.size);
    const cy = clamp(b.y, k.y, k.y + k.size);
    let ddx = b.x - cx, ddy = b.y - cy;
    let d2 = ddx*ddx + ddy*ddy;

    if (d2 > ballR * ballR) continue;               // no overlap

    let nx, ny;
    if (ddx === 0 && ddy === 0){
      // centre is inside the block - push out along the shallowest axis
      const left   = b.x - k.x;
      const right  = (k.x + k.size) - b.x;
      const top    = b.y - k.y;
      const bottom = (k.y + k.size) - b.y;
      const m = Math.min(left, right, top, bottom);
      if (m === left)        { nx = -1; ny = 0; b.x = k.x - ballR; }
      else if (m === right)  { nx =  1; ny = 0; b.x = k.x + k.size + ballR; }
      else if (m === top)    { nx = 0; ny = -1; b.y = k.y - ballR; }
      else                   { nx = 0; ny =  1; b.y = k.y + k.size + ballR; }
    } else {
      const d = Math.sqrt(d2) || 0.0001;
      nx = ddx / d; ny = ddy / d;
      // push the ball out to exactly touch the surface
      b.x = cx + nx * ballR;
      b.y = cy + ny * ballR;
    }

    // reflect only if moving into the surface
    const dot = b.vx * nx + b.vy * ny;
    if (dot < 0){
      b.vx -= 2 * dot * nx;
      b.vy -= 2 * dot * ny;
    }

    // damage
    k.hp -= 1;
    if (k.hp <= 0){
      blocks.splice(i, 1);
      score += 1;
    }
    return; // resolved one collision
  }
}

function collectPickups(b){
  for (const p of pickups){
    if (p.collected) continue;
    const dx = b.x - p.x, dy = b.y - p.y;
    const rr = p.r + ballR;
    if (dx*dx + dy*dy <= rr*rr){
      p.collected = true;
      ballCount += 1;                               // +1 ball for next volley
    }
  }
}

function stepBall(b, scale){
  const stepX = (b.vx * scale) / SUBSTEPS;
  const stepY = (b.vy * scale) / SUBSTEPS;

  for (let s = 0; s < SUBSTEPS; s++){
    b.x += stepX;
    b.y += stepY;

    // walls
    if (b.x - ballR < 0)      { b.x = ballR;     b.vx = Math.abs(b.vx); }
    else if (b.x + ballR > W) { b.x = W - ballR; b.vx = -Math.abs(b.vx); }
    if (b.y - ballR < 0)      { b.y = ballR;     b.vy = Math.abs(b.vy); }

    // floor - ball returns
    if (b.y >= bottomY){
      b.y = bottomY;
      b.alive = false;
      if (firstReturnX == null) firstReturnX = b.x;
      return;
    }

    collideBall(b);
    collectPickups(b);
  }
}

/* =========================================================================
   Update
   ========================================================================= */
function update(dt){
  if (phase !== 'shooting') return;
  const scale = dt / 16.6667;                       // framerate independence

  // launch queued balls on a timer
  if (toFire > 0){
    fireTimer -= dt;
    while (toFire > 0 && fireTimer <= 0){
      spawnBall();
      toFire -= 1;
      fireTimer += FIRE_GAP;
    }
  }

  for (const b of balls){
    if (!b.alive) continue;
    b.life += dt;
    if (b.life > MAX_BALL_LIFE && b.vy < 0) b.vy = Math.abs(b.vy); // nudge strays home
    stepBall(b, scale);
  }

  // drop returned balls
  balls = balls.filter(function(b){ return b.alive; });

  // volley complete?
  if (toFire === 0 && balls.length === 0){
    pickups = pickups.filter(function(p){ return !p.collected; });
    endRound();
  }
}

/* =========================================================================
   Trajectory preview (reflects off side walls, stops at first obstacle)
   ========================================================================= */
function drawAim(){
  if (!aiming || !aimValid || phase !== 'idle') return;

  let x = launcherX, y = bottomY;
  let vx = aimDir.x, vy = aimDir.y;
  const dots = [];
  const stepLen = 9;
  for (let i = 0; i < 260; i++){
    x += vx * stepLen;
    y += vy * stepLen;
    if (x < ballR){ x = ballR; vx = Math.abs(vx); }
    else if (x > W - ballR){ x = W - ballR; vx = -Math.abs(vx); }
    if (y < ballR) break;                            // top
    // stop at first block
    let hit = false;
    for (const k of blocks){
      if (x > k.x - ballR && x < k.x + k.size + ballR &&
          y > k.y - ballR && y < k.y + k.size + ballR){ hit = true; break; }
    }
    if (hit) break;
    if (i % 2 === 0) dots.push({x:x, y:y});
  }

  ctx.save();
  ctx.fillStyle = 'rgba(25,246,255,0.85)';
  ctx.shadowColor = 'rgba(25,246,255,0.9)';
  ctx.shadowBlur = 8;
  for (let i = 0; i < dots.length; i++){
    const a = 1 - i / dots.length;
    ctx.globalAlpha = 0.15 + a * 0.7;
    const rr = 2.2 + a * 1.6;
    ctx.beginPath();
    ctx.arc(dots[i].x, dots[i].y, rr, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

/* =========================================================================
   Render
   ========================================================================= */
function drawBackgroundGrid(){
  ctx.save();
  ctx.strokeStyle = 'rgba(80,120,255,0.05)';
  ctx.lineWidth = 1;
  const step = cell;
  ctx.beginPath();
  for (let gx = originX; gx <= W; gx += step){ ctx.moveTo(gx, 0); ctx.lineTo(gx, H); }
  for (let gy = topMargin; gy <= H; gy += step){ ctx.moveTo(0, gy); ctx.lineTo(W, gy); }
  ctx.stroke();
  ctx.restore();
}

function drawBlocks(){
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (const b of blocks){
    const c = hpColor(b.hp);
    ctx.shadowColor = c.glow;
    ctx.shadowBlur = 16;
    ctx.fillStyle = c.fill;
    roundRect(b.x, b.y, b.size, b.size, Math.max(6, b.size * 0.16));
    ctx.fill();

    ctx.shadowBlur = 0;
    ctx.lineWidth = 2;
    ctx.strokeStyle = c.border;
    roundRect(b.x + 1, b.y + 1, b.size - 2, b.size - 2, Math.max(5, b.size * 0.15));
    ctx.stroke();

    // HP label
    ctx.fillStyle = '#ffffff';
    ctx.shadowColor = c.glow;
    ctx.shadowBlur = 8;
    ctx.font = '800 ' + Math.max(12, Math.floor(b.size * 0.40)) + 'px Orbitron, monospace';
    ctx.fillText(String(b.hp), b.x + b.size / 2, b.y + b.size / 2 + 1);
    ctx.shadowBlur = 0;
  }
  ctx.restore();
}

function drawPickups(){
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (const p of pickups){
    if (p.collected) continue;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.shadowColor = 'rgba(255,45,149,0.9)';
    ctx.shadowBlur = 14;
    ctx.lineWidth = 2.5;
    ctx.strokeStyle = '#ff2d95';
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#ff8ec5';
    ctx.font = '800 ' + Math.floor(p.r * 1.05) + 'px Orbitron, monospace';
    ctx.fillText('+1', p.x, p.y + 1);
  }
  ctx.restore();
}

function drawBalls(){
  ctx.save();
  ctx.fillStyle = '#ffffff';
  ctx.shadowColor = 'rgba(255,255,255,0.95)';
  ctx.shadowBlur = 12;
  for (const b of balls){
    ctx.beginPath();
    ctx.arc(b.x, b.y, ballR, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function drawLauncher(){
  ctx.save();
  // glowing baseline
  ctx.strokeStyle = 'rgba(25,246,255,0.18)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, bottomY + ballR + 2);
  ctx.lineTo(W, bottomY + ballR + 2);
  ctx.stroke();

  if (phase === 'idle'){
    ctx.beginPath();
    ctx.arc(launcherX, bottomY, ballR + 2, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(25,246,255,0.9)';
    ctx.shadowColor = 'rgba(25,246,255,0.9)';
    ctx.shadowBlur = 16;
    ctx.fill();
  }
  ctx.restore();
}

function drawHUD(){
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';

  // score (big, centred)
  ctx.fillStyle = '#ffffff';
  ctx.shadowColor = 'rgba(25,246,255,0.8)';
  ctx.shadowBlur = 18;
  ctx.font = '800 ' + Math.round(H * 0.045) + 'px Orbitron, monospace';
  ctx.fillText(String(score), W / 2, topMargin * 0.62);

  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(234,246,255,0.55)';
  ctx.font = '700 ' + Math.round(H * 0.016) + 'px Rajdhani, monospace';
  ctx.fillText('SCORE', W / 2, topMargin * 0.30);

  // round (left) + balls (right)
  ctx.textAlign = 'left';
  ctx.fillStyle = 'rgba(234,246,255,0.85)';
  ctx.font = '700 ' + Math.round(H * 0.020) + 'px Rajdhani, monospace';
  ctx.fillText('ROUND ' + round, 16, topMargin * 0.55);

  ctx.textAlign = 'right';
  ctx.fillStyle = '#ff2d95';
  ctx.shadowColor = 'rgba(255,45,149,0.7)';
  ctx.shadowBlur = 10;
  ctx.fillText('\u25CF ' + ballCount, W - 16, topMargin * 0.55);
  ctx.restore();
}

function render(){
  ctx.clearRect(0, 0, W, H);
  drawBackgroundGrid();
  drawBlocks();
  drawPickups();
  drawAim();
  drawLauncher();
  drawBalls();
  drawHUD();
}

/* =========================================================================
   Game over / restart
   ========================================================================= */
function gameOver(){
  phase = 'over';
  finalEl.textContent = String(score);
  overlay.classList.add('show');
}

function resetGame(){
  round = 1;
  score = 0;
  ballCount = START_BALLS;
  launcherX = W / 2;
  blocks = []; pickups = []; balls = [];
  toFire = 0; firstReturnX = null;
  phase = 'idle';
  overlay.classList.remove('show');
  if (hintEl){ hintEl.style.opacity = '1'; }
  spawnRow();
}

returnBtn.addEventListener('click', function(){
  const payload = JSON.stringify({ action: "submit_score", score: score, game: "brick_breaker" });
  if (window.Telegram && window.Telegram.WebApp) {
    window.Telegram.WebApp.sendData(payload);
    try { window.Telegram.WebApp.close(); } catch (e) {}
  } else {
    // graceful fallback when opened outside Telegram
    console.log('sendData ->', payload);
    alert('Score ' + score + ' ready to submit (open inside Telegram to return to the bot).');
  }
});

againBtn.addEventListener('click', resetGame);

/* =========================================================================
   Main loop
   ========================================================================= */
let last = performance.now();
function loop(now){
  const dt = Math.min(34, now - last);   // clamp dt (tab switches / lag spikes)
  last = now;
  update(dt);
  render();
  requestAnimationFrame(loop);
}

/* ---------- Boot ---------- */
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', function(){ setTimeout(resize, 150); });

resize();
spawnRow();
requestAnimationFrame(loop);
</script>
</body>
</html>
